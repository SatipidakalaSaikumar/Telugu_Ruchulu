<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telugu Ruchulu Catering</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-yellow-50 text-gray-900 pb-20">

    <header class="bg-yellow-400 p-6 text-center shadow-md">
        <h1 class="text-3xl font-bold text-red-900">Telugu Ruchulu</h1>
        <p class="text-red-800">Authentic Catering Services</p>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div class="flex border-b-2 border-red-800 mb-6">
            <button onclick="showTab('veg')" id="btn-veg" class="w-1/2 py-2 font-bold text-red-900 bg-yellow-200">Veg</button>
            <button onclick="showTab('nv')" id="btn-nv" class="w-1/2 py-2 font-bold text-red-900 bg-yellow-100">Non-Veg</button>
        </div>

        <div id="veg-menu" class="space-y-2"></div>
        <div id="nv-menu" class="hidden space-y-2"></div>

        <div class="fixed bottom-0 left-0 right-0 bg-white p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
            <h3 class="font-bold text-sm mb-1">Your Order:</h3>
            <div id="cart-list" class="text-xs h-16 overflow-y-auto mb-2 italic">None</div>
            <button onclick="sendOrder()" class="w-full bg-green-600 text-white font-bold py-2 rounded">Order via WhatsApp</button>
        </div>
    </main>

    <script>
        const vegData = ["Veg Pulav", "Veg Biryani", "Panasakaya Pulav", "Kaju Mutter Pulav", "Chintapandu Pulihora", "Bagara Rice", "Veg Manchurian", "Paneer 65", "Veg Gold Coin", "Mushroom 65"];
        const nvData = ["Chicken Dum Biryani", "Mutton Dum Biryani", "Chicken 65", "Chilli Chicken", "Chicken Majestic", "Apollo Fish", "Andhra Chicken Fry", "Dum ka Chicken", "Mutton Curry"];
        let cart = [];

        function render() {
            document.getElementById('veg-menu').innerHTML = vegData.map(i => `<div class="bg-white p-3 flex justify-between shadow-sm rounded"><span>${i}</span><button onclick="add('${i}')" class="bg-red-700 text-white px-3 rounded">+</button></div>`).join('');
            document.getElementById('nv-menu').innerHTML = nvData.map(i => `<div class="bg-white p-3 flex justify-between shadow-sm rounded"><span>${i}</span><button onclick="add('${i}')" class="bg-red-700 text-white px-3 rounded">+</button></div>`).join('');
        }

        function add(item) { cart.push(item); document.getElementById('cart-list').innerText = cart.join(', '); }
        
        function showTab(t) {
            document.getElementById('veg-menu').classList.toggle('hidden', t !== 'veg');
            document.getElementById('nv-menu').classList.toggle('hidden', t !== 'nv');
        }

        function sendOrder() {
            window.open(`https://wa.me/919949959087?text=${encodeURIComponent("New Order: " + cart.join(', '))}`);
        }
        render();
    </script>
</body>
</html>
