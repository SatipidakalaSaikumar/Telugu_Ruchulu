<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telugu Ruchulu Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-yellow-50 text-gray-900 pb-10">

    <header class="bg-yellow-400 p-8 text-center shadow-md">
        <h1 class="text-3xl font-serif font-bold text-red-900">Telugu Ruchulu</h1>
        <p class="text-red-800">Authentic Catering Services</p>
    </header>

    <main class="max-w-lg mx-auto p-4">
        <div class="flex border-b-2 border-red-800 mb-6">
            <button onclick="showTab('veg')" class="w-1/2 py-2 font-bold text-red-900 bg-yellow-200">Veg Menu</button>
            <button onclick="showTab('nonveg')" class="w-1/2 py-2 font-bold text-red-900 bg-yellow-100">Non-Veg Menu</button>
        </div>

        <div id="veg" class="space-y-4">
            <h2 class="text-xl font-bold border-l-4 border-red-800 pl-2">Vegetarian Items</h2>
            <div class="bg-white p-4 rounded shadow">
                <p>Veg Pulav</p>
                <button class="text-sm bg-red-700 text-white px-2 py-1 rounded">Select</button>
            </div>
            </div>

        <div id="nonveg" class="hidden space-y-4">
            <h2 class="text-xl font-bold border-l-4 border-red-800 pl-2">Non-Veg Items</h2>
            <div class="bg-white p-4 rounded shadow">
                <p>Chicken Dum Biryani</p>
                <button class="text-sm bg-red-700 text-white px-2 py-1 rounded">Select</button>
            </div>
            </div>
    </main>

    <script>
        function showTab(tab) {
            document.getElementById('veg').classList.toggle('hidden', tab !== 'veg');
            document.getElementById('nonveg').classList.toggle('hidden', tab !== 'nonveg');
        }
    </script>
</body>
</html>
